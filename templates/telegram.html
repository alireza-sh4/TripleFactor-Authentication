{% extends "base.html" %}
{% block content %}
<div class="step-indicator">
    <div class="dot done">&#10003;</div>
    <div class="dot done">&#10003;</div>
    <div class="dot active">3</div>
</div>
<h2>Approval Required</h2>
<p>We've sent a push notification to your Telegram device. Please open Telegram and click <strong>Approve</strong> or <strong>Deny</strong> to continue.</p>

<div style="text-align: center; margin: 40px 0;">
    <div class="spinner" style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f4f6; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div style="margin-top: 15px; color: #6b7280; font-size: 14px;" id="status-text">Waiting for approval...</div>
</div>

<style>
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<script>
    // Poll the backend every 2 seconds to check if the user clicked Approve/Deny in Telegram
    setInterval(function() {
        fetch('/api/telegram_status')
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.status === 'approved') {
                    document.getElementById('status-text').innerText = 'Approved! Redirecting...';
                    document.getElementById('status-text').style.color = '#10b981';
                    window.location.href = '/dashboard';
                } else if (data.status === 'denied') {
                    document.getElementById('status-text').innerText = 'Login Denied. Redirecting...';
                    document.getElementById('status-text').style.color = '#dc2626';
                    setTimeout(function() { window.location.href = '/login'; }, 2000);
                } else if (data.error) {
                    window.location.href = '/login';
                }
            });
    }, 2000);
</script>
{% endblock %}
